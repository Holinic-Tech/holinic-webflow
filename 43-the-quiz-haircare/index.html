    <!--

      relays the GA dataLayer events to Mixpanel + Converge — so NO GTM changes are needed.
      Guarded to the LIVE host only: it never runs on localhost/127.0.0.1, so `npm run dev`,
      the Studio, and the e2e (which shim window.dataLayer themselves) stay clean.
    -->

          if (window.cvg) {
            window.cvg({
              method: 'event', event: eventName, properties: properties,
              eventId: eventId, profileProperties: profileProperties, aliases: aliases,

        var c = document.createElement('script');

        }, window.cvg.queue = []);

        window.cvg({ method: 'track', eventName: '$page_load' });

        // --- Google Tag Manager (GTM-TT5MJDF) ---
        (function (w, d, s, l, i) {
